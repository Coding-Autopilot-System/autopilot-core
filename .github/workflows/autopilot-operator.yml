name: Autopilot Operator

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  operator:
    runs-on: [self-hosted, Windows]
    env:
      ORG: ${{ vars.ORG }}
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Ensure Codex on PATH
        shell: pwsh
        run: |
          $codexPath = "C:\Users\admin\AppData\Roaming\npm"
          if (Test-Path $codexPath) {
            "PATH=$codexPath;$env:PATH" | Out-File -FilePath $env:GITHUB_ENV -Append
          }

      - name: Checkout
        uses: actions/checkout@v4
        with:
          clean: false

      - name: Tool checks
        shell: pwsh
        run: |
          git --version
          gh --version
          if (Get-Command codex -ErrorAction SilentlyContinue) {
            codex --version
          } else {
            Write-Host "Codex not found on PATH"
            exit 1
          }

      - name: Run operator
        shell: pwsh
        run: .\scripts\autopilot-operator.ps1
