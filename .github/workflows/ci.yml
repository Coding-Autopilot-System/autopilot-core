name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate workflow YAML
        run: |
          python -c "
          import yaml, glob
          files = glob.glob('.github/workflows/*.yml')
          for f in files:
              with open(f) as fh:
                  yaml.safe_load(fh)
              print('  OK:', f)
          print('Validated', len(files), 'workflow files')
          "
